<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0e0e0e"/>

  <!-- subtle grid lines -->
  <g stroke="#1a1a1a" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="473" x2="1200" y2="473"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- accent dot cluster -->
  <circle cx="980" cy="120" r="60" fill="#f0c040" opacity="0.12"/>
  <circle cx="1020" cy="100" r="30" fill="#f0c040" opacity="0.2"/>
  <circle cx="1050" cy="140" r="8" fill="#f0c040"/>

  <!-- main title -->
  <text x="80" y="260" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="120" fill="#e8e4de" letter-spacing="-4">draft</text>
  <text x="80" y="380" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="120" fill="#e8e4de" letter-spacing="-4">duder<tspan fill="#f0c040">.</tspan></text>

  <!-- tagline -->
  <text x="85" y="440" font-family="monospace" font-size="22" fill="#7a756d" letter-spacing="3" text-transform="uppercase">PREDICT THE 2026 NFL DRAFT</text>

  <!-- pick slots hint -->
  <g transform="translate(80, 480)">
    <rect x="0" y="0" width="40" height="40" rx="4" fill="#161616" stroke="#2a2a2a"/>
    <text x="20" y="27" font-family="monospace" font-size="16" fill="#7a756d" text-anchor="middle">1</text>
  </g>
  <g transform="translate(50, 480)">
    <rect x="0" y="0" width="40" height="40" rx="4" fill="#161616" stroke="#2a2a2a"/>
    <text x="20" y="27" font-family="monospace" font-size="16" fill="#7a756d" text-anchor="middle">2</text>
  </g>
  <g transform="translate(100, 480)">
    <rect x="0" y="0" width="40" height="40" rx="4" fill="#161616" stroke="#2a2a2a"/>
    <text x="20" y="27" font-family="monospace" font-size="16" fill="#7a756d" text-anchor="middle">3</text>
  </g>
  <g transform="translate(150, 480)">
    <rect x="0" y="0" width="40" height="40" rx="4" fill="#161616" stroke="#f0c040" stroke-dasharray="4 3"/>
    <text x="20" y="27" font-family="monospace" font-size="16" fill="#f0c040" text-anchor="middle">?</text>
  </g>
  <g transform="translate(220, 480)">
    <text x="0" y="28" font-family="monospace" font-size="15" fill="#7a756d">... 32 picks</text>
  </g>

  <!-- bottom bar -->
  <rect x="0" y="610" width="1200" height="20" fill="#f0c040"/>
</svg>
